# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  db:
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"

  bridge:
    command: npx tsx --watch bridge/index.ts
    volumes:
      - .:/app
      - /app/node_modules
